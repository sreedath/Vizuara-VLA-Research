# CalibDrive Conformal Prediction Configuration

description: "Conformal prediction with coverage guarantees"

model:
  name: "openvla/openvla-7b"
  dtype: "float16"
  device: "cuda"

uncertainty:
  method: "conformal"
  alpha: 0.1  # 90% coverage guarantee
  calibration_fraction: 0.3

dataset:
  name: "navsim"
  split: "val"
  num_samples: 1000
  prediction_horizon: 10

evaluation:
  accuracy_threshold: 2.0
  collision_radius: 2.0
  num_bins: 15

seed: 42
noise_scale: 0.85
